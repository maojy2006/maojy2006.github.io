      <div class="post-abstract">
        <p>1997年7月2日，也就是香港回归祖国的第二天，举国都处在欢庆之中。<br>
而千里之外的泰国，政府面对国际资本的猛烈进攻，最终放弃了固定汇率制，实行浮动汇率制，使泰铢开始了无法控制得疯狂贬值。由此带来的是几十年来人民辛辛苦苦积累起来的经济增长化为灰烬，企业破产、人民失业……<br>
谁也没想到，一年后的香港，也将面临艰难决战。</p>
